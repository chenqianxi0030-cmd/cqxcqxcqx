<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Spinner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    .spinner-page {
      min-height: 100vh;
      padding-top: 120px;
      padding-bottom: 80px;
      background: linear-gradient(
        to bottom,
        #fbf6ec 0%,
        #f3eadb 55%,
        #efe0c8 100%
      );
      color: #8b6f4e;
      overflow-x: hidden;
    }

    .spinner-hero {
      text-align: center;
      padding: 0 30px;
      margin-bottom: 35px;
    }

    .spinner-hero h1 {
      font-family: 'Patrick Hand', cursive;
      font-size: 96px;
      color: #8b6f4e;
      margin-bottom: 8px;
      line-height: 1;
    }

    .spinner-hero p {
      max-width: 720px;
      margin: 0 auto;
      font-size: 22px;
      line-height: 1.5;
      color: #6f5538;
    }

    .spinner-layout {
      width: 90%;
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 0.85fr;
      gap: 50px;
      align-items: center;
    }

    .spinner-card,
    .result-panel,
    .option-editor {
      background: rgba(255,255,255,0.9);
      border-radius: 38px;
      padding: 42px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.08);
      text-align: center;
    }

    .wheel-wrapper {
      position: relative;
      width: 430px;
      height: 430px;
      margin: 0 auto 34px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wheel-pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 40px solid #8b6f4e;
      z-index: 10;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.12));
    }

    .wheel {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 6px solid #8b6f4e;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 3s cubic-bezier(.15,.85,.25,1);
      box-shadow: 0 20px 42px rgba(0,0,0,0.12);
      position: relative;
      overflow: hidden;
    }

    .wheel::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 2px dashed rgba(139,111,78,0.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
    }

    .wheel-label {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120px;
      min-height: 22px;
      margin-left: -60px;
      margin-top: -11px;
      font-family: 'Patrick Hand', cursive;
      font-size: 19px;
      line-height: 1;
      color: #5f4933;
      text-align: center;
      z-index: 4;
      pointer-events: none;
      white-space: normal;
      word-break: break-word;
    }

    .wheel-center {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: #8b6f4e;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Patrick Hand', cursive;
      font-size: 34px;
      line-height: 1.05;
      border: 8px solid white;
      z-index: 5;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .spin-button {
      border: none;
      border-radius: 999px;
      background: #8b6f4e;
      color: white;
      font-family: 'Patrick Hand', cursive;
      font-size: 30px;
      padding: 14px 38px;
      cursor: pointer;
      transition: 0.25s;
    }

    .spin-button:hover {
      opacity: 0.88;
      transform: translateY(-3px);
    }

    .spin-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .result-panel {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .result-panel h2 {
      font-family: 'Patrick Hand', cursive;
      font-size: 58px;
      color: #8b6f4e;
      margin-bottom: 18px;
      text-align: center;
      line-height: 1;
    }

    .result-sticker {
      width: 210px;
      height: 210px;
      border-radius: 40px;
      background: #ead6b8;
      border: 10px solid white;
      box-shadow: 0 14px 35px rgba(0,0,0,0.12);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 82px;
      margin: 14px 0 24px;
      animation: stickerFloat 3.2s ease-in-out infinite;
    }

    .result-food {
      font-family: 'Patrick Hand', cursive;
      font-size: 42px;
      color: #4b2f2f;
      text-align: center;
      margin-bottom: 12px;
      line-height: 1;
    }

    .result-desc {
      font-size: 18px;
      color: #6f5538;
      line-height: 1.5;
      text-align: center;
      max-width: 390px;
    }

    .option-editor {
      width: 90%;
      max-width: 1180px;
      margin: 46px auto 0;
    }

    .option-editor h2 {
      font-family: 'Patrick Hand', cursive;
      font-size: 48px;
      color: #8b6f4e;
      margin-bottom: 16px;
      line-height: 1;
    }

    .add-option-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .add-option-row input {
      width: 320px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1.5px solid #8b6f4e;
      background: #fbf6ec;
      color: #6f5538;
      font-size: 16px;
    }

    .add-option-row button,
    .reset-options-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      background: #8b6f4e;
      color: white;
      font-family: 'Patrick Hand', cursive;
      font-size: 24px;
      cursor: pointer;
    }

    .reset-options-btn {
      background: #ead6b8;
      color: #8b6f4e;
      margin-top: 18px;
    }

    .option-tags {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .option-tag {
      background: #f3eadb;
      color: #6f5538;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option-tag button {
      border: none;
      background: transparent;
      color: #8b6f4e;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    @keyframes stickerFloat {
      0%, 100% {
        transform: translateY(0) rotate(-2deg);
      }

      50% {
        transform: translateY(-12px) rotate(2deg);
      }
    }

    @keyframes resultPop {
      0% {
        transform: scale(0.8) rotate(-6deg);
        opacity: 0;
      }

      70% {
        transform: scale(1.08) rotate(3deg);
        opacity: 1;
      }

      100% {
        transform: scale(1) rotate(0);
        opacity: 1;
      }
    }

    @media (max-width: 980px) {
      .spinner-layout {
        grid-template-columns: 1fr;
      }

      .wheel-wrapper {
        width: 360px;
        height: 360px;
      }

      .wheel {
        width: 340px;
        height: 340px;
      }

      .wheel-label {
        width: 96px;
        margin-left: -48px;
        font-size: 16px;
      }
    }

    @media (max-width: 620px) {
      .spinner-page {
        padding-top: 105px;
        padding-bottom: 70px;
      }

      .spinner-hero {
        padding: 0 22px;
        margin-bottom: 28px;
      }

      .spinner-hero h1 {
        font-size: 64px;
        line-height: 0.95;
        margin-bottom: 14px;
      }

      .spinner-hero p {
        max-width: 330px;
        font-size: 21px;
        line-height: 1.35;
      }

      .spinner-layout {
        width: calc(100% - 24px);
        gap: 28px;
      }

      .spinner-card,
      .result-panel,
      .option-editor {
        padding: 28px 18px;
        border-radius: 34px;
      }

      .wheel-wrapper {
        width: 300px;
        height: 300px;
        margin-bottom: 30px;
      }

      .wheel-pointer {
        top: -4px;
        border-left-width: 18px;
        border-right-width: 18px;
        border-top-width: 34px;
      }

      .wheel {
        width: 280px;
        height: 280px;
        border-width: 5px;
      }

      .wheel::after {
        inset: 17px;
      }

      .wheel-center {
        width: 104px;
        height: 104px;
        font-size: 27px;
        border-width: 7px;
      }

      .wheel-label {
        display: block !important;
        width: 62px;
        min-height: 18px;
        margin-left: -31px;
        margin-top: -9px;
        font-size: 12px !important;
        line-height: 0.95;
        color: #5f4933;
        z-index: 4;
        white-space: normal;
        word-break: break-word;
      }

      .spin-button {
        font-size: 28px;
        padding: 13px 34px;
      }

      .result-panel {
        min-height: auto;
      }

      .result-panel h2 {
        font-size: 44px;
      }

      .result-sticker {
        width: 145px;
        height: 145px;
        border-radius: 30px;
        font-size: 58px;
        border-width: 8px;
      }

      .result-food {
        font-size: 34px;
      }

      .result-desc {
        font-size: 17px;
        max-width: 300px;
      }

      .option-editor {
        width: calc(100% - 24px);
        margin-top: 34px;
      }

      .option-editor h2 {
        font-size: 40px;
      }

      .add-option-row {
        flex-direction: column;
        align-items: center;
      }

      .add-option-row input {
        width: 100%;
        max-width: 310px;
        font-size: 16px;
      }

      .add-option-row button,
      .reset-options-btn {
        width: 100%;
        max-width: 310px;
        font-size: 23px;
      }

      .option-tags {
        gap: 10px;
      }

      .option-tag {
        font-size: 15px;
        padding: 9px 13px;
      }
    }

    @media (max-width: 390px) {
      .spinner-hero h1 {
        font-size: 58px;
      }

      .spinner-hero p {
        font-size: 19px;
      }

      .wheel-wrapper {
        width: 272px;
        height: 272px;
      }

      .wheel {
        width: 254px;
        height: 254px;
      }

      .wheel-center {
        width: 94px;
        height: 94px;
        font-size: 25px;
      }

      .wheel-label {
        width: 56px;
        margin-left: -28px;
        font-size: 11px !important;
      }
    }
  </style>
</head>

<body>

  <header class="top-nav">
    <div class="nav-logo">
      <a href="index.html">
        <img src="logo.svg" alt="Dinner logo">
      </a>
    </div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#dinnerbot">Dinner Finder</a>
      <a href="journal.html">Food Journal</a>
      <a href="spinner.html">Food Spinner</a>
      <a href="badges.html">Badge Collection</a>
    </nav>
  </header>

  <main class="spinner-page">

    <section class="spinner-hero">
      <h1>Food Spinner</h1>
      <p>
        Add your own dinner options, spin the wheel, and let the website choose what you should eat.
      </p>
    </section>

    <section class="spinner-layout">

      <div class="spinner-card">

        <div class="wheel-wrapper">
          <div class="wheel-pointer"></div>

          <div class="wheel" id="foodWheel">
            <div class="wheel-center">
              SPIN<br>ME
            </div>
          </div>
        </div>

        <button class="spin-button" id="spinBtn" onclick="spinFood()">
          Spin the Wheel
        </button>

      </div>

      <div class="result-panel">

        <h2>Tonight's Pick</h2>

        <div class="result-sticker" id="resultSticker">
          🍽️
        </div>

        <div class="result-food" id="resultFood">
          Waiting for your spin...
        </div>

        <div class="result-desc" id="resultDesc">
          Click the spin button and get a dinner idea.
        </div>

      </div>

    </section>

    <section class="option-editor">
      <h2>Edit Dinner Options</h2>

      <div class="add-option-row">
        <input id="newOptionInput" type="text" placeholder="Add a food option, e.g. Sushi">
        <button onclick="addOption()">Add Option</button>
      </div>

      <div class="option-tags" id="optionTags"></div>

      <button class="reset-options-btn" onclick="resetOptions()">
        Reset Default Options
      </button>
    </section>

  </main>

  <script>
    const defaultFoods = [
      {
        name: "Ramen",
        emoji: "🍜",
        desc: "A warm noodle dish. Good when you want something comforting and filling."
      },
      {
        name: "Egg Fried Rice",
        emoji: "🍚",
        desc: "Simple, affordable, and filling. A safe choice when you want comfort food."
      },
      {
        name: "Tteokbokki",
        emoji: "🌶️",
        desc: "Spicy, chewy, and fun to eat. Perfect if you want Korean food tonight."
      },
      {
        name: "Hotpot",
        emoji: "🍲",
        desc: "A good choice for sharing with friends and eating something warm."
      },
      {
        name: "Burger",
        emoji: "🍔",
        desc: "Quick and satisfying. A good choice when you want fast food."
      },
      {
        name: "Chicken",
        emoji: "🍗",
        desc: "Crispy, flavourful, and great for a fun dinner."
      },
      {
        name: "Curry Rice",
        emoji: "🍛",
        desc: "Rich, warm, and filling. A good dinner if you want rice."
      },
      {
        name: "Salad",
        emoji: "🥗",
        desc: "A lighter and healthier option when you do not want something too heavy."
      }
    ];

    const OPTION_KEY = "foodSpinnerOptions";

    let foods = loadOptions();
    let currentRotation = 0;
    let latestFood = null;

    renderWheel();
    renderOptionTags();

    window.addEventListener("resize", function () {
      renderWheel();
    });

    function loadOptions() {
      try {
        const saved = JSON.parse(localStorage.getItem(OPTION_KEY));

        if (Array.isArray(saved) && saved.length > 0) {
          return saved;
        }

        return defaultFoods;
      } catch (error) {
        return defaultFoods;
      }
    }

    function saveOptions() {
      localStorage.setItem(OPTION_KEY, JSON.stringify(foods));
    }

    function getLabelRadius() {
      if (window.innerWidth <= 390) {
        return 82;
      }

      if (window.innerWidth <= 620) {
        return 92;
      }

      if (window.innerWidth <= 980) {
        return 124;
      }

      return 145;
    }

    function renderWheel() {
      const wheel = document.getElementById("foodWheel");

      wheel.innerHTML = `
        <div class="wheel-center">
          SPIN<br>ME
        </div>
      `;

      const count = foods.length;

      if (count === 0) {
        wheel.style.background = "#ead6b8";
        return;
      }

      const segment = 360 / count;

      const palette = [
        "#ead6b8",
        "#fffaf2",
        "#d6c2a5",
        "#f3eadb",
        "#efe0c8",
        "#fbf6ec"
      ];

      let gradient = "conic-gradient(";

      foods.forEach(function (food, index) {
        const start = index * segment;
        const end = (index + 1) * segment;

        let color = palette[index % palette.length];

        if (index === foods.length - 1 && color === palette[0] && foods.length > 1) {
          color = palette[2];
        }

        gradient += `${color} ${start}deg ${end}deg`;

        if (index < foods.length - 1) {
          gradient += ", ";
        }
      });

      gradient += ")";

      wheel.style.background = gradient;

      foods.forEach(function (food, index) {
        const label = document.createElement("div");
        label.className = "wheel-label";

        const angle = index * segment + segment / 2;
        const labelRadius = getLabelRadius();

        label.style.transform = `rotate(${angle}deg) translateY(-${labelRadius}px) rotate(${-angle}deg)`;
        label.textContent = shortenText(food.name);

        wheel.appendChild(label);
      });
    }

    function shortenText(text) {
      let limit = 13;

      if (window.innerWidth <= 390) {
        limit = 6;
      } else if (window.innerWidth <= 620) {
        limit = 8;
      } else if (window.innerWidth <= 980) {
        limit = 10;
      }

      if (text.length <= limit) {
        return text;
      }

      return text.slice(0, limit - 1) + ".";
    }

    function renderOptionTags() {
      const optionTags = document.getElementById("optionTags");
      optionTags.innerHTML = "";

      if (foods.length === 0) {
        optionTags.innerHTML = "<p>Please add at least one food option.</p>";
        return;
      }

      foods.forEach(function (food, index) {
        const tag = document.createElement("div");
        tag.className = "option-tag";

        tag.innerHTML = `
          <span>${food.name}</span>
          <button onclick="removeOption(${index})">×</button>
        `;

        optionTags.appendChild(tag);
      });
    }

    function addOption() {
      const input = document.getElementById("newOptionInput");
      const value = input.value.trim();

      if (value === "") {
        alert("Please enter a food option.");
        return;
      }

      foods.push({
        name: value,
        emoji: "🍽️",
        desc: value + " sounds like a good dinner idea tonight."
      });

      input.value = "";

      saveOptions();
      renderWheel();
      renderOptionTags();
    }

    function removeOption(index) {
      foods.splice(index, 1);

      saveOptions();
      renderWheel();
      renderOptionTags();
    }

    function resetOptions() {
      foods = defaultFoods.map(function (food) {
        return {
          name: food.name,
          emoji: food.emoji,
          desc: food.desc
        };
      });

      saveOptions();
      renderWheel();
      renderOptionTags();

      document.getElementById("resultSticker").textContent = "🍽️";
      document.getElementById("resultFood").textContent = "Waiting for your spin...";
      document.getElementById("resultDesc").textContent = "Click the spin button and get a dinner idea.";
    }

    function spinFood() {
      if (foods.length === 0) {
        alert("Please add at least one food option first.");
        return;
      }

      const wheel = document.getElementById("foodWheel");
      const spinBtn = document.getElementById("spinBtn");
      const resultSticker = document.getElementById("resultSticker");
      const resultFood = document.getElementById("resultFood");
      const resultDesc = document.getElementById("resultDesc");

      spinBtn.disabled = true;
      resultFood.textContent = "Choosing...";
      resultDesc.textContent = "The wheel is deciding your dinner.";
      resultSticker.textContent = "✨";

      const randomIndex = Math.floor(Math.random() * foods.length);
      latestFood = foods[randomIndex];

      const segment = 360 / foods.length;
      const targetAngle = randomIndex * segment + segment / 2;

      const extraSpins = 1800;
      const finalRotation = extraSpins + (360 - targetAngle);

      currentRotation += finalRotation;

      wheel.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(function () {
        resultSticker.textContent = latestFood.emoji || "🍽️";
        resultFood.textContent = latestFood.name;
        resultDesc.textContent = latestFood.desc || "This sounds like a good dinner idea tonight.";

        resultSticker.style.animation = "none";
        void resultSticker.offsetWidth;
        resultSticker.style.animation = "resultPop 0.55s ease both, stickerFloat 3.2s ease-in-out infinite 0.55s";

        spinBtn.disabled = false;
      }, 3100);
    }
  </script>

</body>
</html>
